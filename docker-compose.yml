version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-ms
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bibliotheque_db
      MYSQL_USER: ritice
      MYSQL_PASSWORD: ritice
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: