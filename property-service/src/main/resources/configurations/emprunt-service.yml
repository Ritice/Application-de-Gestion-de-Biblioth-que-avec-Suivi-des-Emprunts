spring:
  datasource:
    url: jdbc:mysql://localhost:3306/emprunts_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ritice
    password: ritice
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: true
    baseline-on-migrate: true
    table: flyway_history_emprunts
    locations: classpath:db/migration


  threads:
    virtual:
      enabled: true


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


server:
  port: 8083







