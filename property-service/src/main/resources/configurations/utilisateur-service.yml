server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/utilisateurs_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ritice
    password: ritice
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    table: flyway_history_utilisateur
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: food123456789app123456789food123456789app123456789
  expiration: 86400000